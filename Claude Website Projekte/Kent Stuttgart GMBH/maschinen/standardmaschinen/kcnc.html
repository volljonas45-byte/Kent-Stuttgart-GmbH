<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KCNC — Kent Stuttgart GmbH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root{--blue:#1058C0;--blue2:#1A76F0;--red:#C8221C;--bg:#04091A;--bg1:#070D20;--surface:#101C3A;--muted:#374F72;--dim:#6088B0;--light:#C2D4E8;--white:#FFFFFF;--font-display:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;--font-mono:'Space Mono',monospace}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--white);font-family:var(--font-body);font-weight:300;overflow-x:hidden}
    .logo{font-family:var(--font-display);font-weight:700;font-size:1.5rem;color:var(--blue2);text-decoration:none}.logo span{color:var(--red)}
    .breadcrumb{position:sticky;top:72px;z-index:90;background:var(--surface);padding:.75rem 4rem;display:flex;align-items:center;gap:.5rem;font-family:var(--font-mono);font-size:.7rem;color:var(--muted)}.breadcrumb a{color:var(--dim);text-decoration:none}.breadcrumb a:hover{color:var(--white)}
    .hero{display:grid;grid-template-columns:55fr 45fr;min-height:65vh;padding-top:116px;position:relative;overflow:hidden}.hero::before{content:'';position:absolute;top:-10%;left:-5%;width:60%;height:120%;background:radial-gradient(ellipse,rgba(26,118,240,.2) 0%,transparent 60%);pointer-events:none}
    .hero-left{display:flex;flex-direction:column;justify-content:center;padding:4rem;position:relative;z-index:1}
    .eyebrow{font-family:var(--font-mono);font-size:.7rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}.eyebrow::before{content:'';width:20px;height:2px;background:var(--blue2)}
    h1{font-family:var(--font-display);font-weight:800;font-size:clamp(6rem,14vw,13rem);line-height:.9;text-transform:uppercase;margin-bottom:1.5rem}
    .sub{font-size:1.05rem;color:var(--light);line-height:1.75;max-width:500px;margin-bottom:2rem}.ctas{display:flex;gap:1rem;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;padding:.875rem 2rem;border-radius:10px;font-size:.9rem;font-weight:500;text-decoration:none;transition:all .25s;border:none;cursor:pointer;font-family:var(--font-body)}.btn-p{background:var(--blue2);color:var(--white)}.btn-p:hover{background:var(--blue);transform:translateY(-2px)}.btn-g{background:transparent;color:var(--dim);border:1px solid var(--muted)}.btn-g:hover{color:var(--white);border-color:var(--dim);transform:translateY(-2px)}
    .hero-right{display:flex;align-items:center;justify-content:center;padding:4rem 4rem 4rem 2rem;position:relative;z-index:1}.img-ph{width:100%;aspect-ratio:4/3;background:var(--surface);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;border:1px solid rgba(96,136,176,.15);position:relative;overflow:hidden}.img-ph::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue2),transparent)}.ph-name{font-family:var(--font-display);font-size:3rem;font-weight:700;color:var(--muted);text-transform:uppercase}.ph-sub{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);letter-spacing:.1em}
    s2{padding:6rem 4rem;display:block}.si{max-width:1100px;margin:0 auto}.sc{background:var(--surface);border-radius:14px;overflow:hidden}.sh{padding:1.25rem 2rem;background:rgba(26,118,240,.12);border-bottom:1px solid rgba(96,136,176,.15);font-family:var(--font-mono);font-size:.75rem;color:var(--blue2);letter-spacing:.15em;text-transform:uppercase}
    table{width:100%;border-collapse:collapse}tr{border-bottom:1px solid rgba(96,136,176,.08)}tr:last-child{border-bottom:none}tr:hover{background:rgba(96,136,176,.05)}td{padding:1rem 2rem;font-size:.9rem}td:first-child{color:var(--dim);font-family:var(--font-mono);font-size:.75rem;width:45%}td:last-child{color:var(--white)}
    .fs{background:var(--bg1)}.fb{display:grid;grid-template-columns:80px 1fr;gap:2rem;padding:3rem 0;border-bottom:1px solid rgba(96,136,176,.1)}.fb:last-child{border-bottom:none}.fn{font-family:var(--font-mono);font-size:3rem;color:rgba(96,136,176,.15);line-height:1;font-weight:700}.ft{font-family:var(--font-display);font-weight:700;font-size:1.5rem;text-transform:uppercase;margin-bottom:.75rem}.fx{color:var(--light);line-height:1.75;font-size:.95rem}
    .pn{background:var(--surface);padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center}.pn a{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--dim);text-decoration:none;text-transform:uppercase;transition:color .2s}.pn a:hover{color:var(--white)}
    .cs{background:var(--bg);text-align:center;padding:7rem 4rem;position:relative;overflow:hidden}.cs::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:60%;height:200%;background:radial-gradient(ellipse,rgba(26,118,240,.1) 0%,transparent 60%);pointer-events:none}.ct{font-family:var(--font-display);font-weight:800;font-size:clamp(2.5rem,5vw,4.5rem);text-transform:uppercase;position:relative;z-index:1}.csub{color:var(--dim);margin:1rem 0 2.5rem;position:relative;z-index:1}
    footer{background:var(--bg1);border-top:1px solid rgba(96,136,176,.15);padding:3rem 4rem}.fi{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:2rem}.fb2{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--blue2)}.fl{display:flex;gap:2rem}.fl a{font-size:.85rem;color:var(--muted);text-decoration:none;transition:color .2s}.fl a:hover{color:var(--white)}.fc{font-size:.75rem;color:var(--muted);width:100%}
    .rv{opacity:0;transform:translateY(24px);transition:opacity .6s,transform .6s}.rv.visible{opacity:1;transform:translateY(0)}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.hero-right{display:none}nav,.breadcrumb,.hero-left,s2,.cs,footer,.pn{padding-left:1.5rem!important;padding-right:1.5rem!important}}
