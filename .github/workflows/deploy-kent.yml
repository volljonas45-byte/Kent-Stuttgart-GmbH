name: Deploy Kent Stuttgart GmbH to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Claude Website Projekte/Kent Stuttgart GMBH/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Claude Website Projekte/Kent Stuttgart GMBH"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
